<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sala do Jogo</title>
	<link rel="icon" type="imagem/png" href="res/game.png">
	<link rel="stylesheet" href="css/sala.css">
</head>

<body>
	<div class="game-wrapper">
		<div class="game-header">
			<div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px;">
				<img src="res/game.png" alt="Ícone da Sala" style="width: 40px; height: 40px;">
				<h2 style="margin: 0;">Sala: <span id="lblSala" class="highlight">...</span></h2>
			</div>
			<p>Você é o jogador: <span id="lblJogador" class="highlight">...</span> ( <strong
					id="lblSimbolo">...</strong> )</p>
			<div id="statusTurno" class="status-banner">Aguardando...</div>
		</div>

		<div class="board" id="tabuleiro">
			<div class="cell" onclick="jogar(0)"></div>
			<div class="cell" onclick="jogar(1)"></div>
			<div class="cell" onclick="jogar(2)"></div>
			<div class="cell" onclick="jogar(3)"></div>
			<div class="cell" onclick="jogar(4)"></div>
			<div class="cell" onclick="jogar(5)"></div>
			<div class="cell" onclick="jogar(6)"></div>
			<div class="cell" onclick="jogar(7)"></div>
			<div class="cell" onclick="jogar(8)"></div>
		</div>

		<button class="btn-voltar" onclick="voltarParaLobby()">🚪 Sair da Sala</button>
	</div>

	<script src="js/sala.js"></script>
</body>

</html>
