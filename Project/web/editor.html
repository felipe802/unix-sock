<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Arquivos C</title>
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h3>Arquivos em ./data/</h3>
            <ul id="fileList">
                <li>Carregando...</li>
            </ul>
            <div class="new-file-box">
                <input type="text" id="newFileName" placeholder="novo.txt">
                <button id="btnNovo">Criar</button>
            </div>
        </aside>

        <main class="editor-area">
            <h2>Editando: <span id="currentFile">Nenhum arquivo selecionado</span></h2>
            <textarea id="meuEditor" disabled placeholder="Selecione ou crie um arquivo na lateral..."></textarea>
            <button id="btnSalvar" disabled>Salvar Arquivo</button>
            <div id="statusMensagem" class="status-oculto"></div>
        </main>
    </div>

    <script src="js/editor.js"></script>
</body>
</html>
