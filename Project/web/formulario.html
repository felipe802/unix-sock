<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de POST</title>
    <link rel="stylesheet" href="css/formulario.css">
</head>

<body>
    <div class="form-container">
        <h2>Teste de POST</h2>
        <p class="subtitle">Envie uma mensagem para o servidor C</p>

        <form id="meuFormulario">
            <div class="input-group">
                <label for="mensagem">Mensagem</label>
                <input type="text" id="mensagem" name="mensagem" placeholder="Digite sua mensagem aqui..." required>
            </div>
            <button type="submit">Enviar via POST</button>
        </form>

        <div id="respostaServidor" class="resposta-oculta"></div>
    </div>

    <script src="js/formulario.js"></script>
</body>

</html>
